<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Outer Synth Console Shape -->
  <!-- Left Wood Cheek -->
  <rect x="16" y="64" width="48" height="384" rx="8" fill="url(#woodLeft)" stroke="#321401" stroke-width="4"/>
  <!-- Right Wood Cheek -->
  <rect x="448" y="64" width="48" height="384" rx="8" fill="url(#woodRight)" stroke="#321401" stroke-width="4"/>
  
  <!-- Console Body -->
  <rect x="64" y="64" width="384" height="384" rx="4" fill="#16171b" stroke="#0a0a0c" stroke-width="8"/>
  
  <!-- Grid Lines / Tech Pattern -->
  <path d="M 64 256 L 448 256 M 192 64 L 192 256 M 320 64 L 320 256" stroke="#2b2e38" stroke-width="4" stroke-dasharray="8 8"/>
  
  <!-- Synth Controls / Knobs in Top Panel -->
  <!-- Knob 1 (Orange Glow) -->
  <circle cx="128" cy="128" r="28" fill="#2a2d35" stroke="#ff5e00" stroke-width="6"/>
  <line x1="128" y1="128" x2="128" y2="106" stroke="#ff5e00" stroke-width="6" stroke-linecap="round"/>
  <circle cx="128" cy="128" r="6" fill="#ff5e00"/>
  
  <!-- Knob 2 (Cyan Glow) -->
  <circle cx="256" cy="128" r="28" fill="#2a2d35" stroke="#00e5ff" stroke-width="6"/>
  <line x1="256" y1="128" x2="272" y2="112" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="128" r="6" fill="#00e5ff"/>

  <!-- Slider (Yellow Accent) -->
  <rect x="368" y="96" width="8" height="64" rx="4" fill="#2a2d35" stroke="#2b2e38" stroke-width="2"/>
  <rect x="356" y="120" width="32" height="16" rx="3" fill="#ffcf00"/>
  <line x1="356" y1="128" x2="388" y2="128" stroke="#16171b" stroke-width="2"/>

  <!-- Waveform Indicator (Cyan/Red LED graph style) -->
  <path d="M 80 210 L 140 210 L 170 170 L 210 240 L 250 180 L 290 220 L 320 160 L 350 210 L 432 210" fill="none" stroke="#00e5ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Keyboard Keys at the Bottom -->
  <!-- White Keys -->
  <rect x="80" y="272" width="56" height="160" rx="4" fill="#f5f6f8" stroke="#111" stroke-width="4"/>
  <rect x="144" y="272" width="56" height="160" rx="4" fill="#f5f6f8" stroke="#111" stroke-width="4"/>
  <rect x="208" y="272" width="56" height="160" rx="4" fill="#f5f6f8" stroke="#111" stroke-width="4"/>
  <rect x="272" y="272" width="56" height="160" rx="4" fill="#f5f6f8" stroke="#111" stroke-width="4"/>
  <rect x="336" y="272" width="56" height="160" rx="4" fill="#f5f6f8" stroke="#111" stroke-width="4"/>
  
  <!-- Highlighted/Active Key in Neon Orange -->
  <rect x="208" y="272" width="56" height="160" rx="4" fill="#ff5e00" stroke="#ff5e00" stroke-width="4" opacity="0.95"/>
  
  <!-- Black Keys -->
  <rect x="122" y="272" width="30" height="100" rx="3" fill="#111"/>
  <rect x="186" y="272" width="30" height="100" rx="3" fill="#111"/>
  <rect x="250" y="272" width="30" height="100" rx="3" fill="#111"/>
  <rect x="314" y="272" width="30" height="100" rx="3" fill="#111"/>

  <!-- Glowing Keyboard accent bar -->
  <rect x="80" y="260" width="312" height="8" rx="2" fill="#ff5e00" filter="url(#glow)"/>

  <!-- Gradients & Filters -->
  <defs>
    <!-- Left Wood Cheek Gradient -->
    <linearGradient id="woodLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5c2d0c"/>
      <stop offset="50%" stop-color="#461f05"/>
      <stop offset="100%" stop-color="#321401"/>
    </linearGradient>
    <!-- Right Wood Cheek Gradient -->
    <linearGradient id="woodRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#321401"/>
      <stop offset="50%" stop-color="#461f05"/>
      <stop offset="100%" stop-color="#5c2d0c"/>
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
